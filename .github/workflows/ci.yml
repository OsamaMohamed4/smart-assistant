name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check (backend)
        run: |
          node --check server.js
          node --check db.js
          node --check companies.js
          node --check summarize.js
          for f in lib/*.js routes/*.js scripts/*.js; do node --check "$f"; done

      - name: Build admin UI
        run: npm run build

      - name: Smoke test (boot server + critical paths)
        run: npm run test:smoke
